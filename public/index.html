<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NHL DASHBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* Styles copied and improved from your original design */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#f5f8fc;
  --border:#dde4ee;--border2:#c8d3e6;
  --text:#0d1b2e;--muted:#6b7fa0;--muted2:#9aaac4;
  --blue:#0057b8;--blue-lt:#e8f0fb;
  --win:#0a8f5c;--win-bg:#e6f7f1;
  --loss:#c0392b;--loss-bg:#fcecea;
  --sn:#d0021b;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
body{
  background-image:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(0,87,184,.07) 0%,transparent 60%),
  linear-gradient(180deg,#eef2f7 0%,#e8edf5 100%);
  background-attachment:fixed;
}
.header{text-align:center;padding:60px 20px 40px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,10vw,120px);letter-spacing:7px;color:var(--text)}
.header h1 span{color:var(--blue)}
.header p{color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:10px}

.teams-wrap{max-width:1400px;margin:0 auto;padding:0 20px 32px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}

.team-btn{
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:20px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .15s,background .18s;
  position:relative;overflow:hidden;
}
.team-btn img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));transition:transform .18s}
.team-btn span{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--muted);transition:color .18s}
.team-btn.active img{transform:scale(1.1)}
.team-btn.active span{color:var(--blue)}

.detail-wrap{max-width:1300px;margin:0 auto;padding:0 20px 70px}
.detail-panel{
  background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:36px;
  box-shadow:0 8px 40px -10px rgba(0,60,140,.1);
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.games-grid{grid-template-columns:1fr}}
.game-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:16px;padding:24px}
.game-tag{display:flex;align-items:center;gap:7px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;font-weight:600}
.divider{border:none;border-top:1.5px solid var(--border);margin:14px 0}
.info-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);margin-bottom:9px}
.result-badge{display:inline-flex;align-items:center;gap:10px;padding:7px 14px;border-radius:9px;margin-bottom:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.result-w{background:var(--win-bg);color:var(--win);border:1.5px solid rgba(10,143,92,.2)}
.result-l{background:var(--loss-bg);color:var(--loss);border:1.5px solid rgba(192,57,43,.2)}
.sn-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 14px;margin-top:12px;background:#fff;border:1.5px solid #f5c0c0;border-radius:10px;color:var(--sn);font-size:13px;font-weight:600;text-decoration:none;transition:background .15s,transform .12s,border-color .15s;font-family:'Inter',sans-serif}
.sn-btn:hover{background:#fff5f5;border-color:var(--sn);transform:translateY(-1px)}
.loader{text-align:center;padding:48px}
.loader-spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff5f5;border:1.5px solid #fcc;border-radius:10px;padding:16px 20px;margin-top:12px}
.error-box p{color:var(--loss);font-size:13px;line-height:1.6}
.no-game{color:var(--muted);font-size:13px;padding:8px 0}
</style>
</head>
<body>

<div class="header">
  <h1>NHL <span>DASHBOARD</span></h1>
  <p>Select a team · Next game · Last result · Highlights</p>
</div>

<div class="teams-wrap">
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<div class="detail-wrap">
  <div id="detailPanel" class="detail-panel">Select a team to load schedule</div>
</div>

<script>
// Full 32 NHL teams
const TEAMS = [
  {a:"ANA",c:"Anaheim",n:"Ducks",color:"#F47A38"},
  {a:"BOS",c:"Boston",n:"Bruins",color:"#FFB81C"},
  {a:"BUF",c:"Buffalo",n:"Sabres",color:"#003087"},
  {a:"CGY",c:"Calgary",n:"Flames",color:"#C8102E"},
  {a:"CAR",c:"Carolina",n:"Hurricanes",color:"#CC0000"},
  {a:"CHI",c:"Chicago",n:"Blackhawks",color:"#CF0A2C"},
  {a:"COL",c:"Colorado",n:"Avalanche",color:"#6F263D"},
  {a:"CBJ",c:"Columbus",n:"Blue Jackets",color:"#002654"},
  {a:"DAL",c:"Dallas",n:"Stars",color:"#006847"},
  {a:"DET",c:"Detroit",n:"Red Wings",color:"#CE1126"},
  {a:"EDM",c:"Edmonton",n:"Oilers",color:"#FF4C00"},
  {a:"FLA",c:"Florida",n:"Panthers",color:"#C8102E"},
  {a:"LAK",c:"Los Angeles",n:"Kings",color:"#898B8E"},
  {a:"MIN",c:"Minnesota",n:"Wild",color:"#154734"},
  {a:"MTL",c:"Montreal",n:"Canadiens",color:"#AF1E2D"},
  {a:"NSH",c:"Nashville",n:"Predators",color:"#FFB81C"},
  {a:"NJD",c:"New Jersey",n:"Devils",color:"#CE1126"},
  {a:"NYI",c:"NY Islanders",n:"Islanders",color:"#FC4C02"},
  {a:"NYR",c:"NY Rangers",n:"Rangers",color:"#0038A8"},
  {a:"OTT",c:"Ottawa",n:"Senators",color:"#C8102E"},
  {a:"PHI",c:"Philadelphia",n:"Flyers",color:"#F74902"},
  {a:"PIT",c:"Pittsburgh",n:"Penguins",color:"#FCB514"},
  {a:"SEA",c:"Seattle",n:"Kraken",color:"#007888"},
  {a:"SJS",c:"San Jose",n:"Sharks",color:"#006D75"},
  {a:"STL",c:"St. Louis",n:"Blues",color:"#002F87"},
  {a:"TBL",c:"Tampa Bay",n:"Lightning",color:"#002868"},
  {a:"TOR",c:"Toronto",n:"Maple Leafs",color:"#003E7E"},
  {a:"UTA",c:"Utah",n:"Hockey Club",color:"#4B92DB"},
  {a:"VAN",c:"Vancouver",n:"Canucks",color:"#00843D"},
  {a:"VGK",c:"Vegas",n:"Golden Knights",color:"#B4975A"},
  {a:"WSH",c:"Washington",n:"Capitals",color:"#C8102E"},
  {a:"WPG",c:"Winnipeg",n:"Jets",color:"#041E42"}
];

const logo = a => `https://assets.nhle.com/logos/nhl/svg/${a}_light.svg`;

const grid = document.getElementById('teamsGrid');
const panel = document.getElementById('detailPanel');

TEAMS.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'team-btn';
  btn.style.setProperty('--tc', t.color);
  btn.innerHTML = `<img src="${logo(t.a)}" alt="${t.n}"><span>${t.a}</span>`;
  btn.addEventListener('click', ()=>selectTeam(t));
  grid.appendChild(btn);
});

async function selectTeam(t){
  document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget?.classList.add('active');
  panel.innerHTML = `<div class="loader"><div class="loader-spinner"></div><p>Loading ${t.n} schedule...</p></div>`;

  try {
    const res = await fetch(`/api/team/${t.a}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    const games = data.schedule.dates.flatMap(d=>d.games);
    games.sort((a,b)=>new Date(a.gameDate)-new Date(b.gameDate));

    const past = games.filter(g=>new Date(g.gameDate)<new Date());
    const future = games.filter(g=>new Date(g.gameDate)>=new Date());
    const lastGame = past[past.length-1];
    const nextGame = future[0];

    const buildGameHTML = (game,isNext)=>{
      if(!game) return `<p class="no-game">${isNext?'No upcoming games':'No recent games'}</p>`;
      const isHome = game.teams.home.team.abbreviation===t.a;
      const opp = isHome?game.teams.away.team:game.teams.home.team;
      const myScore = isHome?game.teams.home.score:game.teams.away.score;
      const oppScore = isHome?game.teams.away.score:game.teams.home.score;
      const won = myScore>oppScore;

      const dateObj = new Date(game.gameDate);
      const dateStr = dateObj.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
      const timeStr = dateObj.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});

      return `
        ${myScore!==undefined?`<div class="result-badge ${won?'result-w':'result-l'}">${won?'WIN':'LOSS'} ${myScore}-${oppScore}</div>`:''}
        <div class="vs-row">
          <img src="${logo(opp.abbreviation)}" alt="${opp.name}">
          <div class="opp"><h3>VS ${opp.abbreviation}</h3><p>${opp.name}</p></div>
          <span class="ha-tag ${isHome?'ha-home':'ha-away'}">${isHome?'HOME':'AWAY'}</span>
        </div>
        <hr class="divider">
        <div class="info-row"><strong>${dateStr}</strong></div>
        <div class="info-row"><strong>${timeStr}</strong></div>
        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(`${opp.name} ${t.n} highlights`)}" target="_blank" class="sn-btn">Watch Highlights</a>
      `;
    };

    panel.innerHTML = `
      <div class="games-grid">
        <div class="game-card"><div class="game-tag">Next Game</div>${buildGameHTML(nextGame,true)}</div>
        <div class="game-card"><div class="game-tag">Last Game</div>${buildGameHTML(lastGame,false)}</div>
      </div>
    `;

  } catch(e){
    panel.innerHTML = `<div class="error-box"><p>Error loading NHL data</p><code>${e.message}</code></div>`;
  }
}
</script>
</body>
</html>
