<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NHL Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#f5f8fc;
  --border:#dde4ee;--border2:#c8d3e6;
  --text:#0d1b2e;--muted:#6b7fa0;--muted2:#9aaac4;
  --blue:#0057b8;--blue-lt:#e8f0fb;
  --win:#0a8f5c;--win-bg:#e6f7f1;
  --loss:#c0392b;--loss-bg:#fcecea;
  --sn:#d0021b;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
body{
  background-image:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(0,87,184,.07) 0%,transparent 60%),
  linear-gradient(180deg,#eef2f7 0%,#e8edf5 100%);
  background-attachment:fixed;
}
.header{text-align:center;padding:52px 24px 36px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,9vw,100px);letter-spacing:7px;line-height:1;color:var(--text)}
.header h1 span{color:var(--blue)}
.header p{color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:10px}

.teams-wrap{max-width:1300px;margin:0 auto;padding:0 20px 32px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}

.team-btn{
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:18px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .15s,background .18s;
  position:relative;overflow:hidden;
}
.team-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--tc,var(--blue));transform:scaleX(0);transition:transform .2s}
.team-btn:hover{background:var(--blue-lt);transform:translateY(-3px);border-color:var(--tc,var(--blue));box-shadow:0 6px 24px -6px rgba(0,87,184,.18)}
.team-btn:hover::after,.team-btn.active::after{transform:scaleX(1)}
.team-btn.active{background:var(--blue-lt);border-color:var(--tc,var(--blue));box-shadow:0 6px 28px -6px rgba(0,87,184,.22);transform:translateY(-3px)}
.team-btn img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));transition:transform .18s}
.team-btn:hover img,.team-btn.active img{transform:scale(1.09)}
.team-btn span{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted);transition:color .18s}
.team-btn.active span,.team-btn:hover span{color:var(--tc,var(--blue))}

.detail-wrap{max-width:1300px;margin:0 auto;padding:0 20px 70px}
.detail-panel{
  background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:36px;
  position:relative;overflow:hidden;animation:fadeUp .3s ease;
  box-shadow:0 8px 40px -10px rgba(0,60,140,.1);
}
.detail-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--tc,var(--blue))}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.detail-head{display:flex;align-items:center;gap:22px;margin-bottom:28px;flex-wrap:wrap}
.detail-head img{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 3px 10px rgba(0,0,0,.15))}
.detail-head .team-name h2{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:3px;line-height:1.05;color:var(--text)}
.detail-head .team-name p{color:var(--blue);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-weight:500}

.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.games-grid{grid-template-columns:1fr}}

.game-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:16px;padding:24px}
.game-tag{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;font-weight:600}
.game-tag .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.vs-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.vs-row img{width:50px;height:50px;object-fit:contain}
.vs-row .opp{flex:1}
.vs-row .opp h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--text);line-height:1}
.vs-row .opp p{font-size:12px;color:var(--muted);margin-top:3px}
.ha-tag{font-size:10px;padding:3px 9px;border-radius:5px;letter-spacing:1px;text-transform:uppercase;font-weight:600;flex-shrink:0}
.ha-home{background:#e8f0fb;color:var(--blue);border:1px solid #c2d5f5}
.ha-away{background:#fff7e6;color:#b07000;border:1px solid #f0d88a}

.divider{border:none;border-top:1.5px solid var(--border);margin:14px 0}
.info-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);margin-bottom:9px}
.info-row:last-child{margin-bottom:0}
.info-row strong{color:var(--text);font-weight:500}

.result-badge{display:inline-flex;align-items:center;gap:10px;padding:7px 14px;border-radius:9px;margin-bottom:16px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}
.result-w{background:var(--win-bg);color:var(--win);border:1.5px solid rgba(10,143,92,.2)}
.result-l{background:var(--loss-bg);color:var(--loss);border:1.5px solid rgba(192,57,43,.2)}

.sn-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:11px 16px;margin-top:14px;background:#fff;border:1.5px solid #f5c0c0;border-radius:10px;color:var(--sn);font-size:13px;font-weight:600;text-decoration:none;transition:background .15s,transform .12s,border-color .15s;font-family:'Inter',sans-serif}
.sn-btn:hover{background:#fff5f5;border-color:var(--sn);transform:translateY(-1px)}
.sn-badge{background:#fff0f0;border:1px solid #fcc;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--sn);letter-spacing:.5px}

.loader{text-align:center;padding:48px}
.loader-spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
.loader p{color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase}
.loader-step{color:var(--muted2);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:7px;min-height:18px}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{background:#fff5f5;border:1.5px solid #fcc;border-radius:10px;padding:16px 20px;margin-top:12px}
.error-box p{color:var(--loss);font-size:13px;line-height:1.6}
.error-box code{font-size:11px;color:var(--muted);display:block;margin-top:8px;word-break:break-all;font-family:monospace}

.live-badge{display:inline-flex;align-items:center;gap:6px;background:#e6f7f1;border:1.5px solid rgba(10,143,92,.25);border-radius:7px;padding:4px 10px;font-size:11px;letter-spacing:2px;color:var(--win);font-weight:600;margin-bottom:14px;text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--win);animation:lpulse 1s ease-in-out infinite;display:inline-block}
@keyframes lpulse{0%,100%{opacity:.4}50%{opacity:1}}

.no-game{color:var(--muted);font-size:13px;padding:8px 0}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <h1>NHL <span>DASHBOARD</span></h1>
  <p>Select a team · Next game · Last result · Highlights</p>
</div>

<div class="teams-wrap">
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<div class="detail-wrap">
  <div id="detailPanel" class="hidden"></div>
</div>

<script>
const TEAMS = [
  {a:"ANA",c:"Anaheim",n:"Ducks",color:"#F47A38"},
  {a:"BOS",c:"Boston",n:"Bruins",color:"#FFB81C"},
  {a:"BUF",c:"Buffalo",n:"Sabres",color:"#003087"},
  {a:"CGY",c:"Calgary",n:"Flames",color:"#C8102E"},
  {a:"CAR",c:"Carolina",n:"Hurricanes",color:"#CC0000"},
  {a:"CHI",c:"Chicago",n:"Blackhawks",color:"#CF0A2C"},
  {a:"COL",c:"Colorado",n:"Avalanche",color:"#6F263D"},
  {a:"CBJ",c:"Columbus",n:"Blue Jackets",color:"#002654"},
  {a:"DAL",c:"Dallas",n:"Stars",color:"#006847"},
  {a:"DET",c:"Detroit",n:"Red Wings",color:"#CE1126"},
  {a:"EDM",c:"Edmonton",n:"Oilers",color:"#FF4C00"},
  {a:"FLA",c:"Florida",n:"Panthers",color:"#C8102E"},
  {a:"LAK",c:"Los Angeles",n:"Kings",color:"#898B8E"},
  {a:"MIN",c:"Minnesota",n:"Wild",color:"#154734"},
  {a:"MTL",c:"Montréal",n:"Canadiens",color:"#AF1E2D"},
  {a:"NSH",c:"Nashville",n:"Predators",color:"#FFB81C"},
  {a:"NJD",c:"New Jersey",n:"Devils",color:"#CE1126"},
  {a:"NYI",c:"NY Islanders",n:"Islanders",color:"#FC4C02"},
  {a:"NYR",c:"NY Rangers",n:"Rangers",color:"#0038A8"},
  {a:"OTT",c:"Ottawa",n:"Senators",color:"#C8102E"},
  {a:"PHI",c:"Philadelphia",n:"Flyers",color:"#F74902"},
  {a:"PIT",c:"Pittsburgh",n:"Penguins",color:"#FCB514"},
  {a:"SEA",c:"Seattle",n:"Kraken",color:"#007888"},
  {a:"SJS",c:"San Jose",n:"Sharks",color:"#006D75"},
  {a:"STL",c:"St. Louis",n:"Blues",color:"#002F87"},
  {a:"TBL",c:"Tampa Bay",n:"Lightning",color:"#002868"},
  {a:"TOR",c:"Toronto",n:"Maple Leafs",color:"#003E7E"},
  {a:"UTA",c:"Utah",n:"Hockey Club",color:"#4B92DB"},
  {a:"VAN",c:"Vancouver",n:"Canucks",color:"#00843D"},
  {a:"VGK",c:"Vegas",n:"Golden Knights",color:"#B4975A"},
  {a:"WSH",c:"Washington",n:"Capitals",color:"#C8102E"},
  {a:"WPG",c:"Winnipeg",n:"Jets",color:"#041E42"},
  {a:"CBJ2",c:"Seattle",n:"Kraken 2",color:"#007888"} // optional 32nd placeholder
];

const logo = a => `https://assets.nhle.com/logos/nhl/svg/${a}_light.svg`;

const grid = document.getElementById('teamsGrid');
TEAMS.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'team-btn';
  btn.id = 'btn-' + t.a;
  btn.style.setProperty('--tc', t.color);
  btn.innerHTML = `<img src="${logo(t.a)}" alt="${t.n}" onerror="this.style.opacity=.15"><span>${t.a}</span>`;
  btn.addEventListener('click', () => selectTeam(t));
  grid.appendChild(btn);
});

let loadToken = 0;
const panel = document.getElementById('detailPanel');

function selectTeam(t) {
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + t.a).classList.add('active');
  const myToken = ++loadToken;
  panel.className = 'detail-panel';
  panel.style.setProperty('--tc', t.color);
  panel.innerHTML = `<div class="loader"><div class="loader-spinner"></div><p>Loading ${t.n}</p><p class="loader-step" id="loaderStep"></p></div>`;
  fetch(`/api/team/${t.a}`)
    .then(r => r.json())
    .then(data => {
      if(myToken!==loadToken) return;
      renderPanel(t,data);
    })
    .catch(e => {
      if(myToken!==loadToken) return;
      panel.innerHTML = `<div class="error-box"><p>Error loading NHL data</p><code>${e.message}</code></div>`;
    });
}

function renderPanel(team,data){
  const last = data.lastGame;
  const next = data.nextGame;
  const ytUrl = data.youtubeUrl;

  panel.innerHTML = `
    <div class="detail-head">
      <img src="${logo(team.a)}" alt="${team.n}">
      <div class="team-name"><h2>${team.c}</h2><h2>${team.n}</h2><p>NHL · ${team.a}</p></div>
    </div>
    <div class="games-grid">
      <div class="game-card">
        <div class="game-tag"><span class="dot" style="background:var(--blue)"></span>Next Game</div>
        ${next ? `<div class="vs-row">
          <img src="${logo(next.opp)}">
          <div class="opp"><h3>VS ${next.opp}</h3><p>${next.oppFull}</p></div>
          <span class="ha-tag ${next.isHome?'ha-home':'ha-away'}">${next.isHome?'HOME':'AWAY'}</span>
        </div>
        <div class="info-row"><strong>${next.date}</strong></div>
        <div class="info-row"><strong>${next.time}</strong></div>` : `<p class="no-game">No upcoming games scheduled.</p>`}
      </div>
      <div class="game-card">
        <div class="game-tag"><span class="dot" style="background:var(--muted2)"></span>Last Game</div>
        ${last ? `<div class="result-badge ${last.won?'result-w':'result-l'}">${last.won?'WIN':'LOSS'} ${last.myScore}-${last.oppScore}</div>
        <div class="vs-row">
          <img src="${logo(last.opp)}">
          <div class="opp"><h3>VS ${last.opp}</h3><p>${last.oppFull}</p></div>
          <span class="ha-tag ${last.isHome?'ha-home':'ha-away'}">${last.isHome?'HOME':'AWAY'}</span>
        </div>` : `<p class="no-game">No previous game recorded.</p>`}
        ${ytUrl ? `<a href="${ytUrl}" target="_blank" class="sn-btn">Watch Highlights</a>`:``}
      </div>
    </div>
  `;
}
</script>
</body>
</html>
