<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NHL Dashboard</title>
<style>
body { font-family: sans-serif; background:#111; color:#fff; text-align:center; }
.team-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:20px; }
.team { padding:10px; border-radius:8px; width:120px; cursor:pointer; background:#222; transition:0.2s; }
.team:hover { background:#333; }
.team img { width:100%; border-radius:6px; }
#details { margin-top:20px; }
</style>
</head>
<body>
<h1>NHL Dashboard</h1>
<div class="team-grid" id="teamGrid"></div>
<div id="details"></div>
<script>
const TEAMS = ["ANA","BOS","BUF","CGY","CAR","CHI","COL","CBJ","DAL","DET","EDM","FLA","LAK","MIN","MTL","NSH","NJD","NYI","NYR","OTT","PHI","PIT","SEA","SJS","STL","TBL","TOR","VGK","VAN","WSH","WPG","UTA"];
const grid = document.getElementById('teamGrid');
const details = document.getElementById('details');

TEAMS.forEach(abbr=>{
  const div=document.createElement('div'); div.className='team'; div.textContent=abbr;
  div.onclick=()=>loadTeam(abbr);
  grid.appendChild(div);
});

async function loadTeam(abbr){
  details.innerHTML='Loading...';
  try{
    const res = await fetch(`/api/team/${abbr}`);
    if(!res.ok) throw new Error('No data');
    const data = await res.json();
    let html = `<h2>${data.team.n}</h2>`;
    if(data.lastGame){
      html+=`<p>Last Game: ${data.lastGame.teams.away.team.name} ${data.lastGame.teams.away.score} - ${data.lastGame.teams.home.team.name} ${data.lastGame.teams.home.score}</p>`;
    }
    if(data.nextGame){
      html+=`<p>Next Game: ${data.nextGame.teams.away.team.name} vs ${data.nextGame.teams.home.team.name} on ${data.nextGame.gameDate}</p>`;
    }
    if(data.lastGame){
      const ytQuery = encodeURIComponent(`${data.lastGame.teams.away.team.name} vs ${data.lastGame.teams.home.team.name} highlights`);
      html+=`<p><a href="https://www.youtube.com/results?search_query=${ytQuery}" target="_blank">Watch Highlights</a></p>`;
    }
    details.innerHTML=html;
  }catch(e){ details.innerHTML='Error loading data'; }
}
</script>
</body>
</html>
