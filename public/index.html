<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NHL Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1c2c;
      color: white;
      text-align: center;
    }

    .teams {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      padding: 15px;
    }

    .team {
      background: #12263a;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .team:hover {
      background: #1f3b57;
    }

    iframe {
      width: 90%;
      height: 400px;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>NHL Dashboard 🏒</header>
  <div class="teams" id="teams"></div>
  <h2 id="teamName">Select a team</h2>
  <div id="teamInfo"></div>
  <iframe id="video"></iframe>

  <script>
    const teams = ["ANA", "BOS", "BUF", "CAR", "CHI", "COL", "DAL", "DET", "EDM", "FLA", "LAK", "MIN", "MTL", "NJD", "NYR", "NYI", "OTT", "PHI", "PIT", "SEA", "SJS", "STL", "TBL", "TOR", "VAN", "VGK", "WSH", "WPG"];

    const teamsDiv = document.getElementById("teams");

    teams.forEach(abbr => {
      const el = document.createElement("div");
      el.className = "team";
      el.innerHTML = abbr;
      el.onclick = () => loadTeam(abbr);
      teamsDiv.appendChild(el);
    });

    async function loadTeam(abbr) {
      document.getElementById("teamName").innerText = abbr;
      document.getElementById("teamInfo").innerText = "Loading...";

      try {
        const res = await fetch(`/api/team/${abbr}`);
        const data = await res.json();
        
        if (data.games && data.games.length > 0) {
          const lastGame = data.games.find(g => g.gameState === "OFF");
          document.getElementById("teamInfo").innerText = `
            Last Game: ${lastGame.awayTeam.abbrev} ${lastGame.awayTeam.score} - ${lastGame.homeTeam.score} ${lastGame.homeTeam.abbrev}
          `;
        } else {
          document.getElementById("teamInfo").innerText = "No recent games";
        }

        // YouTube search for highlights
        const query = encodeURIComponent(`${abbr} NHL highlights Sportsnet`);
        document.getElementById("video").src = `https://www.youtube.com/embed?listType=search&list=${query}`;
      } catch (err) {
        document.getElementById("teamInfo").innerText = "Error loading data";
      }
    }
  </script>
</body>
</html>
