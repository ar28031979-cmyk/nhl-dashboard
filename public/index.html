<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NHL Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* Your design CSS */
body{font-family:'Inter',sans-serif;background:#eef2f7;margin:0;padding:0;}
.header{text-align:center;padding:40px;}
.header h1{font-family:'Bebas Neue';font-size:72px;color:#0d1b2e;}
.header h1 span{color:#0057b8;}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;padding:20px;max-width:1200px;margin:auto;}
.team-btn{background:#fff;border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;cursor:pointer;border:1px solid #ddd;transition:0.2s;}
.team-btn img{width:80px;height:80px;object-fit:contain;}
.team-btn.active{border:2px solid #0057b8;}
.team-btn:hover{transform:translateY(-4px);}
.detail-panel{padding:20px;max-width:900px;margin:20px auto;background:#fff;border:1px solid #ddd;border-radius:16px;}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.game-card{background:#f5f8fc;padding:16px;border-radius:12px;border:1px solid #ccc;}
iframe{width:100%;height:240px;border:none;border-radius:10px;margin-top:12px;}
</style>
</head>
<body>

<div class="header">
  <h1>NHL <span>DASHBOARD</span></h1>
  <p>Select a team to view next game, last result & highlights</p>
</div>

<div class="teams-grid" id="teamsGrid"></div>
<div id="detailPanel"></div>

<script>
// ---- Team list (32 teams) ----
const TEAMS = [
  "ANA","BOS","BUF","CGY","CAR","CHI","COL","CBJ","DAL","DET",
  "EDM","FLA","LAK","MIN","MTL","NSH","NJD","NYI","NYR","OTT",
  "PHI","PIT","SEA","SJS","STL","TBL","TOR","UTA","VAN","VGK",
  "WSH","WPG"
];

const logo = a => `https://assets.nhle.com/logos/nhl/svg/${a}_light.svg`;
const grid = document.getElementById("teamsGrid");
const panel = document.getElementById("detailPanel");

// Build grid
TEAMS.forEach(a => {
  const btn = document.createElement("div");
  btn.className = "team-btn";
  btn.innerHTML = `<img src="${logo(a)}"><span>${a}</span>`;
  btn.onclick = () => selectTeam(a, btn);
  grid.appendChild(btn);
});

let currentToken = 0;
async function selectTeam(team, btn) {
  document.querySelectorAll(".team-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  panel.innerHTML = `<p>Loading ${team}...</p>`;
  const token = ++currentToken;

  try {
    const res = await fetch(`/api/team/${team}`);
    const data = await res.json();
    if (token !== currentToken) return;
    showTeamData(team, data);
  } catch (e) {
    panel.innerHTML = `<p style="color:red">Error loading data</p>`;
  }
}

function showTeamData(team, data) {
  const games = data.dates?.flatMap(d=>d.games) || [];
  const now = new Date();
  const next = games.find(g => new Date(g.gameDate) >= now);
  const lastGames = games.filter(g => new Date(g.gameDate) < now);
  const last = lastGames[lastGames.length - 1];

  let html = `<div class="detail-panel"><h2>${team}</h2><div class="games-grid">`;

  // Next game
  if (next) {
    html += `<div class="game-card">
      <h3>Next Game</h3>
      <p>${next.teams.away.team.abbreviation} @ ${next.teams.home.team.abbreviation}<br>${new Date(next.gameDate).toLocaleString()}</p>
    </div>`;
  } else {
    html += `<div class="game-card"><h3>Next Game</h3><p>No scheduled game</p></div>`;
  }

  // Last game
  if (last) {
    html += `<div class="game-card">
      <h3>Last Game</h3>
      <p>${last.teams.away.team.abbreviation} ${last.teams.away.score} - ${last.teams.home.score} ${last.teams.home.team.abbreviation}</p>
      ${getYouTubeHighlight(last)}
    </div>`;
  } else {
    html += `<div class="game-card"><h3>Last Game</h3><p>No recent game data</p></div>`;
  }

  html += "</div></div>";
  panel.innerHTML = html;
}

function getYouTubeHighlight(game) {
  const home = game.teams.home.team.abbreviation;
  const away = game.teams.away.team.abbreviation;
  const query = `${away} vs ${home} NHL highlights`;
  return `<iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}" allowfullscreen></iframe>`;
}
</script>

</body>
</html>
