<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NHL Tracker Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* Paste your previous styles here */
body{font-family:'Inter',sans-serif;background:#eef2f7;margin:0;padding:0}
/* … include your full CSS for header, teams, detail panel, loader, badges etc. … */
</style>
</head>
<body>

<div class="header">
  <h1>NHL <span>TRACKER</span></h1>
  <p>Select a team · Next game · Last result · Highlights</p>
</div>

<div class="teams-wrap">
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<div class="detail-wrap">
  <div id="detailPanel" class="hidden"></div>
</div>

<script>
const TEAMS = [
  {a:"ANA",n:"Ducks",color:"#F47A38"},
  {a:"BOS",n:"Bruins",color:"#FFB81C"},
  {a:"BUF",n:"Sabres",color:"#003087"},
  {a:"CGY",n:"Flames",color:"#C8102E"},
  {a:"CAR",n:"Hurricanes",color:"#CC0000"},
  {a:"CHI",n:"Blackhawks",color:"#CF0A2C"},
  {a:"COL",n:"Avalanche",color:"#6F263D"},
  {a:"CBJ",n:"Blue Jackets",color:"#002654"},
  {a:"DAL",n:"Stars",color:"#006847"},
  {a:"DET",n:"Red Wings",color:"#CE1126"},
  {a:"EDM",n:"Oilers",color:"#FF4C00"},
  {a:"FLA",n:"Panthers",color:"#C8102E"},
  {a:"LAK",n:"Kings",color:"#898B8E"},
  {a:"MIN",n:"Wild",color:"#154734"},
  {a:"MTL",n:"Canadiens",color:"#AF1E2D"},
  {a:"NSH",n:"Predators",color:"#FFB81C"},
  {a:"NJD",n:"Devils",color:"#CE1126"},
  {a:"NYI",n:"Islanders",color:"#FC4C02"},
  {a:"NYR",n:"Rangers",color:"#0038A8"},
  {a:"OTT",n:"Senators",color:"#C8102E"},
  {a:"PHI",n:"Flyers",color:"#F74902"},
  {a:"PIT",n:"Penguins",color:"#FCB514"},
  {a:"SEA",n:"Kraken",color:"#007888"},
  {a:"SJS",n:"Sharks",color:"#006D75"},
  {a:"STL",n:"Blues",color:"#002F87"},
  {a:"TBL",n:"Lightning",color:"#002868"},
  {a:"TOR",n:"Maple Leafs",color:"#003E7E"},
  {a:"VAN",n:"Canucks",color:"#00843D"},
  {a:"VGK",n:"Golden Knights",color:"#B4975A"},
  {a:"WSH",n:"Capitals",color:"#C8102E"},
  {a:"WPG",n:"Jets",color:"#041E42"}
];

const logo = a => `https://assets.nhle.com/logos/nhl/svg/${a}_light.svg`;

const grid = document.getElementById('teamsGrid');
const panel = document.getElementById('detailPanel');

TEAMS.forEach(t=>{
  const btn=document.createElement('button');
  btn.className='team-btn';
  btn.style.setProperty('--tc', t.color);
  btn.innerHTML=`<img src="${logo(t.a)}"><span>${t.a}</span>`;
  btn.addEventListener('click',()=>selectTeam(t));
  grid.appendChild(btn);
});

let loadToken=0;

async function selectTeam(t){
  document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const token = ++loadToken;
  panel.className='detail-panel';
  panel.innerHTML='<p>Loading...</p>';

  try{
    const res = await fetch(`/api/team/${t.a}`);
    if(!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();
    if(token!==loadToken) return;
    renderPanel(t,data.games);
  }catch(e){
    panel.innerHTML=`<p>Error loading NHL data: ${e.message}</p>`;
  }
}

function renderPanel(team,games){
  const now = new Date();
  const upcoming = games.find(g=>new Date(g.gameDate)>now);
  const last = [...games].reverse().find(g=>new Date(g.gameDate)<=now);

  panel.innerHTML=`
    <div class="detail-head">
      <img src="${logo(team.a)}" alt="${team.n}">
      <div class="team-name">
        <h2>${team.n}</h2><p>NHL · ${team.a}</p>
      </div>
    </div>
    <div class="games-grid">
      <div class="game-card">
        <div>Next Game</div>
        ${upcoming ? nextHTML(upcoming,team.a) : '<p>No upcoming games.</p>'}
      </div>
      <div class="game-card">
        <div>Last Game</div>
        ${last ? lastHTML(last,team.a) : '<p>No recent games.</p>'}
      </div>
    </div>
  `;
}

function nextHTML(g,teamAbbrev){
  const opp = g.teams.home.team.abbreviation===teamAbbrev?g.teams.away.team:g.teams.home.team;
  const isHome = g.teams.home.team.abbreviation===teamAbbrev;
  return `<div>${isHome?'Home':'Away'} VS ${opp.abbreviation} <br>${new Date(g.gameDate).toLocaleString()}</div>`;
}

function lastHTML(g,teamAbbrev){
  const opp = g.teams.home.team.abbreviation===teamAbbrev?g.teams.away.team:g.teams.home.team;
  const isHome = g.teams.home.team.abbreviation===teamAbbrev;
  return `
    <div>${isHome?'Home':'Away'} VS ${opp.abbreviation} <br>
    Score: ${g.teams.home.score}–${g.teams.away.score}</div>
    <iframe width="320" height="180" src="${g.youtube}" allowfullscreen></iframe>
  `;
}
</script>
</body>
</html>
